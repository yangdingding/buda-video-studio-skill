data_reader: "google_drive_api"

google_drive:
  mode: "api"
  root_folder_id: "Google Drive folder id for Buda Videos"
  auth_mode: "device"

  # Option A: device flow, recommended for Codex/local/online IDE agents.
  # Create an OAuth client for TV / limited input devices when available.
  # A Desktop OAuth client can also be used by some local flows, but device
  # flow is the most portable for agent environments.
  client_secret_path: "~/.config/buda-video-studio/google-oauth-client.json"
  token_path: "~/.config/buda-video-studio/google-oauth-token.json"

  # Option B: bring your own access token via env, useful in hosted systems.
  access_token_env: "BUDA_VIDEO_GOOGLE_ACCESS_TOKEN"

  # Online state memory. The skill creates/updates this JSON file in the
  # configured Drive root so approvals and distribution status survive
  # across agent environments.
  status_file_name: "buda-video-status.json"

video_library:
  project_folder_mode: true
  raw_folder_names:
    - "Raw"
    - "原始视频"
    - "原视频"
  cover_folder_names:
    - "Covers"
    - "封面"
  cover_source_folder_names:
    - "成品样片"
    - "封面素材"
    - "Cover Source"
    - "Cover Sources"
  voiceover_folder_names:
    - "Scripts"
    - "Script"
    - "口播"
    - "脚本"
    - "旁白"
  voiceover_file_keywords:
    - "口播"
    - "脚本"
    - "旁白"
    - "voiceover"
    - "script"
  youtube_folder_names:
    - "Youtube"
    - "YouTube"
  shorts_folder_names:
    - "Shorts"
  video_account_folder_names:
    - "视频号"
  social_export_folder_names:
    - "Twitter"
    - "X"
    - "X Twitter"

topic_sources:
  enabled: true
  # Preferred: App Buda Drive topic sheet file. Supports Google Sheets or CSV.
  # You can paste either the file id or the full Drive file URL.
  drive_file_id: ""
  drive_file_url: ""
  # Buda Drive UI link fallback. In Web Buda/agent environments this resolves to
  # /agent/<file query path>, for example /agent/选题表/topics.csv.
  buda_drive_url: ""
  buda_file_path: ""
  # Optional local CSV fallback. If omitted, the generator auto-detects:
  # - BUDA_VIDEO_TOPICS_CSV
  # - app/.cache/topics.csv
  # - /agent/选题表/topics.csv
  # - ~/选题表/topics.csv
  csv_path: ""

video_rules:
  # Required production checks: voiceover markdown/subtitle, PNG/JPG cover source/material,
  # and raw video. A final cover under Covers also satisfies the cover-material check.
  distribution_ready_requires_export: true
  ready_for_edit_requires_voiceover: true
  ready_for_edit_requires_cover: true
  ready_for_edit_requires_raw: true
  ready_for_edit_accepts_script: true
  ready_for_edit_accepts_transcript: true
  missing_cover_adds_risk: true
  default_topic_direction: "Buda product/GTM video"
  default_target_audience: "SaaS founders, indie hackers, and GTM operators"
  default_long_form_duration: "3-5 min full cut; 30-60s short cuts"

channels:
  - "YouTube 中文"
  - "YouTube English"
  - "YouTube Shorts"
  - "LinkedIn"
  - "小红书"
  - "视频号"
  - "Facebook"
  - "Instagram"

style:
  cover_tone: "清晰、强利益点、适合创始人和增长负责人"
  default_cta: "关注 Buda，获取 AI GTM 自动化工作流"
