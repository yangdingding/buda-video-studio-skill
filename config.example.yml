topic_sources:
  enabled: true
  # Preferred: App Buda Drive topic sheet file. Supports Google Sheets or CSV.
  # You can paste either the file id or the full Drive file URL.
  drive_file_id: ""
  drive_file_url: ""
  # Buda Drive UI link fallback. In Web Buda/agent environments this resolves to
  # /agent/<file query path>, for example /agent/选题表/topics.csv.
  buda_drive_url: ""
  buda_file_path: ""
  # Optional local CSV fallback. If omitted, the generator auto-detects:
  # - BUDA_VIDEO_TOPICS_CSV
  # - app/.cache/topics.csv
  # - /agent/选题表/topics.csv
  # Avoid committing personal home-directory or local Drive sync paths here.
  csv_path: ""
  # Used only by the explicit import-thread-kit migration command. Runtime
  # reads the normalized topic CSV produced by that command.
  repository_paths:
    - "/agent/buda/works/vikadata-kapps"
  repository_refs:
    - "origin/develop"
  markdown_patterns:
    - "apps/busabase-cloud/content/influencer/thread-kit/*.md"
  repository_fetch: true
  repository_enrichment: false
  include_repository_topics: false
  repository_only: false

production:
  default_engine: "hyperframes"
  default_brand_profile: "project"
  video_workspace_repository: "vikadata/videos"
  delivery_skill: "buda-video-delivery"
  script_folder_name: "Script"
  ai_video_folder_name: "Remotion"
  post_folder_name: "Post"
  distribution_folder_name: "Distribution"

video_rules:
  # Pre-recording AI package checks: script/storyboard, HyperFrames/Remotion
  # AI video with voice+subtitles, and the final cover. Human screen recording
  # is checked after AI video approval.
  distribution_ready_requires_export: true
  ready_for_edit_requires_voiceover: true
  ready_for_edit_requires_draft_video: true
  ready_for_edit_requires_cover: true
  ready_for_edit_requires_raw: true
  ready_for_edit_accepts_script: true
  ready_for_edit_accepts_transcript: true
  missing_cover_adds_risk: true
  default_topic_direction: "Buda product/GTM video"
  default_target_audience: "SaaS founders, indie hackers, and GTM operators"
  default_long_form_duration: "3-5 min full cut; 30-60s short cuts"

channels:
  - "YouTube 中文"
  - "YouTube English"
  - "YouTube Shorts"
  - "LinkedIn"
